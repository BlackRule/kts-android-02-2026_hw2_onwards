services:
  postgres:
    image: postgres:16-alpine
    container_name: myapplication-postgres
    environment:
      POSTGRES_DB: myapplication
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp -d myapplication"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: myapplication-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/myapplication
      DB_USER: myapp
      DB_PASSWORD: myapp
    ports:
      - "8080:8080"

volumes:
  postgres_data:
